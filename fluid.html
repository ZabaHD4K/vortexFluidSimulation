<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vortex — 2D Navier-Stokes Fluid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Fluid-page overrides: magenta/violet accent palette */
    :root {
      --accent-a: #a78bfa;
      --accent-b: #7c3aed;
    }
    .ui-title {
      background: linear-gradient(110deg, #a78bfa, #c084fc, #e879f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      background: linear-gradient(to right, #a78bfa var(--pct, 50%), rgba(255,255,255,0.07) var(--pct, 50%));
    }
    input[type="range"]::-webkit-slider-thumb {
      box-shadow: 0 0 0 2px rgba(167,139,250,0.35), 0 0 10px rgba(167,139,250,0.25);
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 3px rgba(167,139,250,0.45), 0 0 16px rgba(167,139,250,0.4);
    }
    .btn.primary {
      background: linear-gradient(135deg, rgba(124,58,237,0.18), rgba(167,139,250,0.12));
      border-color: rgba(124,58,237,0.30);
      color: #c084fc;
    }
    .btn.primary:hover {
      background: linear-gradient(135deg, rgba(124,58,237,0.26), rgba(167,139,250,0.20));
      border-color: rgba(167,139,250,0.45);
      color: #e879f9;
    }
    .btn.tidal {
      background: linear-gradient(135deg, rgba(167,139,250,0.12), rgba(192,132,252,0.08));
      border-color: rgba(167,139,250,0.25);
      color: #c084fc;
    }
    .btn.tidal:hover {
      background: linear-gradient(135deg, rgba(167,139,250,0.22), rgba(192,132,252,0.16));
      border-color: rgba(167,139,250,0.45);
      color: #e879f9;
    }
    .key {
      background: rgba(167,139,250,0.12);
      border-color: rgba(167,139,250,0.25);
    }
    .color-btn.active { border-color: rgba(167,139,250,0.35); }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="ui" id="ui">
    <div class="ui-header">
      <div>
        <div class="ui-title">Vortex 2D</div>
        <div class="ui-subtitle">Navier-Stokes &middot; GPU Fluid</div>
        <a class="mode-link" href="index.html">&larr; 3D SPH</a>
      </div>
      <button class="icon-btn" id="toggleUI">&#8722;</button>
    </div>

    <div class="divider"></div>

    <div class="collapsible">

      <div class="control-group">
        <div class="control-label">
          <span>Bubbles</span>
          <span class="control-value" id="particleVal">16 384</span>
        </div>
        <input type="range" id="particleCount" min="0" max="4" step="1" value="2" />
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>Vorticity</span>
          <span class="control-value" id="vorticityVal">25</span>
        </div>
        <input type="range" id="vorticity" min="5" max="50" step="1" value="25" />
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>Dissipation</span>
          <span class="control-value" id="dissipationVal">0.985</span>
        </div>
        <input type="range" id="dissipation" min="0.90" max="1.00" step="0.001" value="0.985" />
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>Splat Size</span>
          <span class="control-value" id="splatVal">0.83</span>
        </div>
        <input type="range" id="splatSize" min="0.20" max="2.50" step="0.05" value="0.83" />
      </div>

      <div class="divider"></div>

      <div class="control-label" style="margin-bottom:8px"><span>Fluid</span></div>
      <div class="color-modes">
        <button class="color-btn active" data-mode="0"><span>Ocean</span></button>
        <button class="color-btn"        data-mode="1"><span>Tropic</span></button>
        <button class="color-btn"        data-mode="2"><span>Thermal</span></button>
        <button class="color-btn"        data-mode="3"><span>Biolum</span></button>
      </div>

      <div class="divider"></div>

      <div class="action-btns">
        <button class="btn primary" id="pauseBtn">Pause</button>
        <button class="btn"         id="resetBtn">Reset</button>
      </div>
      <button class="btn tidal" id="tidalBtn">
        Tidal Wave &nbsp;<span class="key">Space</span>
      </button>

    </div>
  </div>

  <div class="controls-hint">
    <span>Click &amp; drag — paint flow</span>
    <span class="sep">&middot;</span>
    <span>Space — tidal wave</span>
    <span class="sep">&middot;</span>
    <span>Touch supported</span>
  </div>

  <div class="fps-badge" id="fpsBadge">-- fps</div>

  <script type="module" src="js/vortex.js"></script>
</body>
</html>
